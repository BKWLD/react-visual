<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Visual Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 40px;
      }

      .demo-section {
        background: white;
        padding: 30px;
        margin-bottom: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        color: #333;
        margin-bottom: 20px;
        font-size: 20px;
      }

      .demo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }

      .demo-item {
        background: #fafafa;
        padding: 15px;
        border-radius: 4px;
      }

      .demo-item h3 {
        color: #555;
        font-size: 14px;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .demo-item .visual-container {
        background: #e0e0e0;
        border-radius: 4px;
        overflow: hidden;
      }

      code {
        background: #f0f0f0;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 13px;
        color: #d73a49;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
